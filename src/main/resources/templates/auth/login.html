<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Accedi')}"></head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container">
    <div class="auth-card">
        <h1>Accedi</h1>

        <div th:if="${param.error}" class="alert alert-error">
            Username o password errati.
        </div>
        <div th:if="${param.registrato}" class="alert alert-success">
            Registrazione completata! Accedi con le tue credenziali.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            Logout effettuato con successo.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       class="form-control" placeholder="Il tuo username" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="La tua password" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Accedi</button>
        </form>

        <p class="auth-link">
            Non hai un account? <a th:href="@{/register}">Registrati</a>
        </p>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
