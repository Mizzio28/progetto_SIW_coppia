<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Registrati')}"></head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container">
    <div class="auth-card">
        <h1>Crea un account</h1>

        <form th:action="@{/register}" th:object="${utente}" method="post">

            <div class="form-row">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" th:field="*{nome}"
                           class="form-control" placeholder="Mario"/>
                </div>
                <div class="form-group">
                    <label for="cognome">Cognome</label>
                    <input type="text" id="cognome" th:field="*{cognome}"
                           class="form-control" placeholder="Rossi"/>
                </div>
            </div>

            <div class="form-group">
                <label for="username">Username <span class="required">*</span></label>
                <input type="text" id="username" th:field="*{username}"
                       th:classappend="${#fields.hasErrors('username')} ? 'input-error'"
                       class="form-control" placeholder="mario_rossi"/>
                <span th:if="${#fields.hasErrors('username')}" class="field-error"
                      th:errors="*{username}"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'input-error'"
                       class="form-control" placeholder="mario@example.com"/>
                <span th:if="${#fields.hasErrors('email')}" class="field-error"
                      th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'input-error'"
                       class="form-control" placeholder="Almeno 6 caratteri"/>
                <span th:if="${#fields.hasErrors('password')}" class="field-error"
                      th:errors="*{password}"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Registrati</button>
        </form>

        <p class="auth-link">
            Hai già un account? <a th:href="@{/login}">Accedi</a>
        </p>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
