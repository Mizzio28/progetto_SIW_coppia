<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Admin - Istruttori')}"></head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container">

    <div class="page-header">
        <h1>Gestione Istruttori</h1>
        <a th:href="@{/admin/istruttori/new}" class="btn btn-primary">+ Nuovo istruttore</a>
    </div>

    <div th:if="${successo}" class="alert alert-success" th:text="${successo}"></div>
    <div th:if="${errore}"   class="alert alert-error"   th:text="${errore}"></div>

    <div th:if="${#lists.isEmpty(istruttori)}" class="empty-state">
        <p>Nessun istruttore presente.</p>
    </div>

    <table th:unless="${#lists.isEmpty(istruttori)}" class="admin-table">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Cognome</th>
                <th>Specializzazione</th>
                <th>Esperienza (anni)</th>
                <th>Corsi</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="istruttore : ${istruttori}">
                <td th:text="${istruttore.nome}">Nome</td>
                <td th:text="${istruttore.cognome}">Cognome</td>
                <td th:text="${istruttore.specializzazione != null ? istruttore.specializzazione : '-'}">-</td>
                <td th:text="${istruttore.anniDiEsperienza != null ? istruttore.anniDiEsperienza : '-'}">-</td>
                <td th:text="${#lists.size(istruttore.corsi)}">0</td>
                <td class="admin-actions">
                    <a th:href="@{/admin/istruttori/{id}/edit(id=${istruttore.id})}" class="btn btn-secondary btn-sm">Modifica</a>
                    <form th:action="@{/admin/istruttori/{id}/delete(id=${istruttore.id})}" method="post"
                          style="display:inline"
                          onsubmit="return confirm('Eliminare l\'istruttore?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger btn-sm">Elimina</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
