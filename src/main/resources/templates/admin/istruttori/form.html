<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${istruttore.id == null ? 'Nuovo Istruttore' : 'Modifica Istruttore'})}"></head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container">

    <div class="page-header">
        <h1 th:text="${istruttore.id == null ? 'Nuovo istruttore' : 'Modifica istruttore'}">Istruttore</h1>
        <a th:href="@{/admin/istruttori}" class="btn btn-link">← Torna alla lista</a>
    </div>

    <form th:action="${istruttore.id == null ? '/admin/istruttori' : '/admin/istruttori/' + istruttore.id + '/edit'}"
          th:object="${istruttore}"
          method="post"
          class="admin-form">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Nome -->
        <div class="form-group">
            <label for="nome">Nome *</label>
            <input type="text" id="nome" th:field="*{nome}" class="form-control"
                   th:classappend="${#fields.hasErrors('nome')} ? 'input-error'" required/>
            <span th:if="${#fields.hasErrors('nome')}" class="error-msg" th:errors="*{nome}"></span>
        </div>

        <!-- Cognome -->
        <div class="form-group">
            <label for="cognome">Cognome *</label>
            <input type="text" id="cognome" th:field="*{cognome}" class="form-control"
                   th:classappend="${#fields.hasErrors('cognome')} ? 'input-error'" required/>
            <span th:if="${#fields.hasErrors('cognome')}" class="error-msg" th:errors="*{cognome}"></span>
        </div>

        <!-- Data di nascita -->
        <div class="form-group">
            <label for="dataDiNascita">Data di nascita</label>
            <input type="date" id="dataDiNascita" th:field="*{dataDiNascita}" class="form-control"
                   th:classappend="${#fields.hasErrors('dataDiNascita')} ? 'input-error'"/>
            <span th:if="${#fields.hasErrors('dataDiNascita')}" class="error-msg" th:errors="*{dataDiNascita}"></span>
        </div>

        <!-- Specializzazione -->
        <div class="form-group">
            <label for="specializzazione">Specializzazione</label>
            <input type="text" id="specializzazione" th:field="*{specializzazione}" class="form-control"/>
        </div>

        <!-- Anni di esperienza -->
        <div class="form-group">
            <label for="anniDiEsperienza">Anni di esperienza</label>
            <input type="number" id="anniDiEsperienza" th:field="*{anniDiEsperienza}" class="form-control"
                   min="0"
                   th:classappend="${#fields.hasErrors('anniDiEsperienza')} ? 'input-error'"/>
            <span th:if="${#fields.hasErrors('anniDiEsperienza')}" class="error-msg" th:errors="*{anniDiEsperienza}"></span>
        </div>

        <!-- URL Foto -->
        <div class="form-group">
            <label for="urlFoto">URL foto</label>
            <input type="text" id="urlFoto" th:field="*{urlFoto}" class="form-control"/>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary"
                    th:text="${istruttore.id == null ? 'Crea istruttore' : 'Salva modifiche'}">Salva</button>
            <a th:href="@{/admin/istruttori}" class="btn btn-link">Annulla</a>
        </div>

    </form>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
